name: Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate docs and handover structure
        run: npm run validate:repo
